# Global tags can be specified here in key="value" format
[global_tags]

# Agent options
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false


[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.1.250:1883"]
  topics = ["mwp/json/data/log/log/#"]
  data_format = "json_v2"
  
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "mwp_sensors"  # You can change this name
    
    # Define controller and zone as tags since they identify the sensor
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "Controller"
      type = "int"
    
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "Zone"
      type = "int"
    
    # Define the sensor readings as fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pressurePSI"
      type = "float"
    
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperatureF"
      type = "float"
    
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "intervalFlow"
      type = "float"
    
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "amperage"
      type = "float"
      
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "secondsOn"
      type = "float"
    
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "gallonsTank"
      type = "float"


# InfluxDB Output Configuration
[[outputs.influxdb_v2]]
  ## The URLs of the InfluxDB cluster nodes.
  urls = ["http://192.168.1.250:8086"]

  ## Token for authentication.
  token = "RHl3fYEp8eMLtIUraVPzY4zp_hnnu2kYlR9hYrUaJLcq5mB2PvDsOi9SR0Tu_i-t_183fHb1a95BTJug-vAPVQ=="
  
  ## Organization is the name of the organization you wish to write to.
  organization = "Milano"
  
  ## Destination bucket to write into.
  bucket = "MWPWater"
